# LLM Agents Metadata Extraction — Configuration

llm:
  provider: "ollama"           # ollama | openai
  model: "mistral"             # mistral | llama3 | gpt-4o-mini
  url: "http://localhost:11434/v1/chat/completions"
  temperature: 0.0
  max_tokens: 1024
  timeout_seconds: 30

ml_classifier:
  models: ["random_forest", "svm"]
  tfidf:
    max_features: 5000
    ngram_range: [1, 3]
  random_forest:
    n_estimators: 200
    max_depth: 10
    random_state: 42
  svm:
    C: 1.0
    kernel: "rbf"
    probability: true

pipeline:
  confidence_threshold: 0.7    # below this, always call LLM to validate
  output_format: "json"
  save_results: true

scraper:
  timeout_seconds: 10
  user_agent: "Mozilla/5.0 (compatible; MetadataExtractor/1.0)"
  max_retries: 3
